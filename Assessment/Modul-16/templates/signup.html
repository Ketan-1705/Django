{% extends 'base.html' %}

{% block title %}EduTracker | Sign Up{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 500px; margin: 4rem auto; padding: 2.5rem; border-radius: 16px;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="section-title" style="margin-bottom: 0.5rem;">Join <span class="gradient-text">EduTracker</span></h1>
        <p class="text-muted">Create your account</p>
    </div>

    <form method="POST" action="{% url 'signup' %}">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <div style="flex: 1;">
                <label for="first_name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">First Name</label>
                <input type="text" id="first_name" name="first_name" required
                       style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                              background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
            </div>
            <div style="flex: 1;">
                <label for="last_name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Last Name</label>
                <input type="text" id="last_name" name="last_name" required
                       style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                              background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
            </div>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email Address</label>
            <input type="email" id="email" name="email" required
                   style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                          background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username"
                   style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                          background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password"
                   style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                          background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
        </div>

        <div style="margin-bottom: 2rem;">
            <label for="role" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">I am a...</label>
            <select id="role" name="role" required
                    style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                           background: #1e293b; color: white; outline: none; font-family: inherit; appearance: none;
                           cursor: pointer;">
                <option value="student">Student</option>
                <option value="faculty">Faculty Member</option>
            </select>
        </div>
        
        <button type="submit" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--secondary), var(--primary)); 
                                     color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; 
                                     cursor: pointer; transition: opacity 0.3s ease; margin-bottom: 1.5rem;">
            Sign Up
        </button>
        
        <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Login</a>
        </p>
    </form>
</div>
{% endblock %}
