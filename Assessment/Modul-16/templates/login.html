{% extends 'base.html' %}

{% block title %}EduTracker | Login{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 4rem auto; padding: 2.5rem; border-radius: 16px;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="section-title" style="margin-bottom: 0.5rem;">Welcome <span class="gradient-text">Back</span></h1>
        <p class="text-muted">Sign in to your account</p>
    </div>

    {% if error %}
    <div style="background: rgba(220, 38, 38, 0.2); border: 1px solid rgba(220, 38, 38, 0.5); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #fca5a5;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username"
                   style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                          background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
        </div>
        
        <div style="margin-bottom: 2rem;">
            <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password"
                   style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                          background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
        </div>
        
        <button type="submit" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--secondary), var(--primary)); 
                                     color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; 
                                     cursor: pointer; transition: opacity 0.3s ease; margin-bottom: 1.5rem;">
            Login
        </button>
        
        <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'signup' %}" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Sign Up</a>
        </p>
    </form>
</div>
{% endblock %}
