{% extends 'base.html' %}

{% block title %}EduTracker | Add Course{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom: 2rem;">
    <a href="{% url 'courses_list' %}" style="color: var(--text-muted); text-decoration: none; margin-bottom: 1rem; display: inline-block;">&larr; Back to Courses</a>
    <h1 class="section-title">Add New <span class="gradient-text">Course</span></h1>
</div>

<div class="glass-panel" style="max-width: 600px; margin: 0 auto; padding: 2.5rem; border-radius: 16px;">
    <form method="POST" action="{% url 'add_course' %}">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label for="title" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Course Title</label>
            <input type="text" id="title" name="title" required
                   style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                          background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit;">
        </div>
        
        <div style="margin-bottom: 2rem;">
            <label for="description" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Description</label>
            <textarea id="description" name="description" rows="5" required
                      style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); 
                             background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit; resize: vertical;"></textarea>
        </div>
        
        <button type="submit" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--secondary), var(--primary)); 
                                     color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; 
                                     cursor: pointer; transition: opacity 0.3s ease;">
            Create Course
        </button>
    </form>
</div>
{% endblock %}
