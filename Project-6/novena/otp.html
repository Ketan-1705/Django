<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTP Verification | Novena Medical</title>

    <!-- Bootstrap 4 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- IcoFont -->
    <link href="https://cdn.jsdelivr.net/npm/icofont@1.0.1/icofont.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="./css/style.css">

    <style>
        .otp-box {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .otp-box input {
            padding: 10px 12px;
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .timer {
            font-size: 14px;
            margin-top: 10px;
            color: #777;
            text-align: center;
        }

        .resend-btn {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .otp-input {
            text-align: center;
            font-size: 20px;
        }

        .otp-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.6);
        }

        /* OTP Box Responsive */

        .otp-box {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .otp-box input {
            padding: 10px 12px;
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        /* Tablet */

        @media (max-width:768px) {

            .login-page {
                flex-direction: column;
            }

            .login-left {
                height: 220px;
                padding: 25px;
                text-align: center;
            }

            .login-left h1 {
                font-size: 24px;
            }

            .login-left p {
                font-size: 14px;
            }

            .login-right {
                padding: 20px;
            }

            .login-form {
                padding: 25px;
            }

        }

        /* Mobile */

        @media (max-width:480px) {

            .login-left {
                height: 200px;
                padding: 20px;
            }

            .login-left h1 {
                font-size: 20px;
            }

            .login-left p {
                font-size: 13px;
            }

            .otp-box {
                justify-content: center;
                gap: 8px;
            }

            .otp-box input {
                width: 40px;
                height: 45px;
                font-size: 18px;
            }

            .login-form {
                padding: 20px;
            }

            .timer {
                font-size: 13px;
            }

        }
    </style>

</head>

<body>

    <div class="login-page">

        <!-- Left Section -->
        <div class="login-left">
            <div class="login-left-content">
                <h1>Welcome Back to Novena Medical</h1>
                <p>Your health is our priority. Access your medical records, book appointments, and manage your care
                    seamlessly with our secure platform.</p>
            </div>
        </div>

        <!-- Right Section -->
        <div class="login-right">

            <form class="login-form" action="#" method="POST">

                <h2>OTP Verification</h2>
                <p class="text-muted">Enter the 6 digit OTP sent to your email</p>

                <div class="otp-box">
                    <input type="text" maxlength="1" class="form-control otp-input">
                    <input type="text" maxlength="1" class="form-control otp-input">
                    <input type="text" maxlength="1" class="form-control otp-input">
                    <input type="text" maxlength="1" class="form-control otp-input">
                    <input type="text" maxlength="1" class="form-control otp-input">
                    <input type="text" maxlength="1" class="form-control otp-input">
                </div>

                <button type="submit" class="btn btn-submit btn-block">Verify OTP</button>

                <div class="timer" id="timer">Resend OTP in 30s</div>

                <div class="resend-btn" id="resendBtn">
                    <button type="button" class="btn btn-link" onclick="startTimer()">Resend OTP</button>
                </div>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        /* OTP Auto Move */

        const inputs = document.querySelectorAll(".otp-input");

        inputs.forEach((input, index) => {

            input.addEventListener("input", () => {

                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }

            });

            input.addEventListener("keydown", (e) => {

                if (e.key === "Backspace" && input.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }

            });

        });


        /* Timer */

        let time = 30;
        let timer = setInterval(updateTimer, 1000);

        function updateTimer() {

            time--;

            document.getElementById("timer").innerText = "Resend OTP in " + time + "s";

            if (time <= 0) {

                clearInterval(timer);
                document.getElementById("timer").style.display = "none";
                document.getElementById("resendBtn").style.display = "block";

            }

        }

        function startTimer() {

            time = 30;

            document.getElementById("resendBtn").style.display = "none";
            document.getElementById("timer").style.display = "block";

            timer = setInterval(updateTimer, 1000);

        }

    </script>

</body>

</html>
