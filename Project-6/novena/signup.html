<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup | Novena Medical</title>

    <!-- Bootstrap 4 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/icofont@1.0.1/icofont.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="login-page">

        <!-- LEFT SIDE -->
        <div class="login-left">
            <div class="login-left-content">

                <h1>Join Novena Medical</h1>

                <p>
                    Create your account to access medical services, manage appointments,
                    and stay connected with our healthcare professionals.
                </p>

            </div>
        </div>


        <!-- RIGHT SIDE SIGNUP FORM -->

        <div class="login-right">

            <form class="login-form" action="#" method="POST">

                <h2>Create Your Account</h2>

                <div class="form-row">

                    <div class="form-group col-md-6">
                        <input type="text" class="form-control" placeholder="First Name" required>
                    </div>

                    <div class="form-group col-md-6">
                        <input type="text" class="form-control" placeholder="Last Name" required>
                    </div>

                </div>


                <div class="form-group">
                    <select class="form-control" required>
                        <option value="hii" aria-placeholder="Select Category" selected>Select Category</option>
                        <option>Doctor</option>
                        <option>Patient</option>
                    </select>
                </div>


                <div class="form-group">
                    <input type="email" class="form-control" placeholder="Email Address" required>
                </div>


                <div class="form-group">
                    <input type="tel" class="form-control" placeholder="Mobile Number" required>
                </div>


                <div class="form-row">

                    <div class="form-group col-md-6">
                        <input type="number" class="form-control" placeholder="Age" required>
                    </div>

                    <div class="form-group col-md-6">

                        <div class="pt-2">

                            <label class="mr-3">
                                <input type="radio" name="gender"> Male
                            </label>

                            <label class="mr-3">
                                <input type="radio" name="gender"> Female
                            </label>

                            <label>
                                <input type="radio" name="gender"> Other
                            </label>

                        </div>

                    </div>

                </div>


                <div class="form-group">
                    <input type="password" class="form-control" placeholder="Password" required>
                </div>


                <div class="form-group">
                    <input type="password" class="form-control" placeholder="Confirm Password" required>
                </div>


                <button type="submit" class="btn btn-submit">
                    Create Account
                </button>


                <p class="text-center mt-3">
                    Already have an account ?
                    <a href="login.html">Login</a>
                </p>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
