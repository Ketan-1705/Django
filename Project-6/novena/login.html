<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Novena Medical</title>
    <!-- Bootstrap 4 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- IcoFont CDN for icons -->
    <link href="https://cdn.jsdelivr.net/npm/icofont@1.0.1/icofont.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="login-page">

        <!-- Left side with background and text -->
        <div class="login-left">
            <div class="login-left-content">
                <h1>Welcome Back to Novena Medical</h1>
                <p>Your health is our priority. Access your medical records, book appointments, and manage your care
                    seamlessly with our secure platform.</p>
            </div>
        </div>

        <!-- Right side login form -->
        <div class="login-right">
            <form class="login-form" action="#" method="POST" autocomplete="off">
                <h2>Login to Your Account</h2>

                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required />
                </div>

                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Enter your password"
                        required />
                </div>
                <div class="login-options">

                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        Remember Me
                    </label>

                    <a href="./Forgot_password.html" class="forgot-password">
                        Forgot Password?
                    </a>

                </div>
                

                <button type="submit" class="btn btn-submit">Sign In</button>
                    <div class="lin" style="display: flex;"><hr width="150px"> OR  <hr width="150px"></div>
                <button type="button" class="btn-google" onclick="alert('Google Sign-In not implemented')">
                    <i class="icofont-google-plus"></i> Connect with Google
                </button>
            </form>
        </div>

    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
